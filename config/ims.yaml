# IMS (IP Multimedia Subsystem) Configuration
# This is a template configuration file. Adjust values for your deployment.

global:
  log_level: debug         # trace, debug, info, warn, error, critical
  node_name: ims-node-01

pcscf:
  listen_addr: 0.0.0.0
  listen_port: 5060
  advertised_addr: 192.168.31.40
  core_entry:
    address: 127.0.0.1
    port: 5062
    transport: udp
  core_peers:
    - address: 127.0.0.1
      port: 5062
      transport: udp
    - address: 127.0.0.1
      port: 5061
      transport: udp
  pcf:
    host: 127.0.0.1
    port: 7777

icscf:
  listen_addr: 0.0.0.0
  listen_port: 5061
  advertised_addr: 192.168.31.40
  local_scscf:
    address: 127.0.0.1
    port: 5062
    transport: udp
  hss:
    host: 127.0.0.1
    port: 3868
    realm: ims.mnc011.mcc460.3gppnetwork.org

scscf:
  listen_addr: 0.0.0.0
  listen_port: 5062
  advertised_addr: 192.168.31.40
  peer_icscf:
    address: 127.0.0.1
    port: 5061
    transport: udp
  auth_mode: ims_only      # ims_only=仅IMS AKA, digest_only=仅普通SIP Digest, hybrid_fallback=优先IMS失败后回退Digest
  registration_cleanup_interval_ms: 30000
  hss:
    host: 127.0.0.1
    port: 3868
    realm: ims.mnc011.mcc460.3gppnetwork.org
  domain: ims.mnc011.mcc460.3gppnetwork.org
  exosip:
    enabled: true
    listen_addr: 0.0.0.0
    listen_port: 5072
    transport: udp
    user_agent: SimIMS-eXosip2
    event_poll_ms: 100

hss_adapter:
  type: diameter            # diameter or nudm
  diameter_host: hss.ims.mnc011.mcc460.3gppnetwork.org
  diameter_port: 3868
  diameter_realm: ims.mnc011.mcc460.3gppnetwork.org
  nudm_url: http://127.0.0.1:8080/nudm-uecm/v1
  mongo_uri: mongodb://127.0.0.1:27017
  mongo_db: simims
  mongo_collection: subscribers
  default_scscf_uri: sip:127.0.0.1:5062;transport=udp

media:
  rtpengine_host: 192.168.31.40
  rtpengine_port: 2223 

dns:
  servers:
    - 127.0.0.1
    - 8.8.8.8
  timeout_ms: 3000         # milliseconds
