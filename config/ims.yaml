# IMS (IP Multimedia Subsystem) Configuration
# This is a template configuration file. Adjust values for your deployment.

global:
  log_level: debug         # trace, debug, info, warn, error, critical
  node_name: ims-node-01

pcscf:
  listen_addr: 0.0.0.0
  listen_port: 5060
  advertised_addr: 192.168.31.40
  pcf:
    host: 127.0.0.1
    port: 7777

icscf:
  listen_addr: 0.0.0.0
  listen_port: 5061
  advertised_addr: 192.168.31.40
  hss:
    host: 127.0.0.1
    port: 3868
    realm: ims.mnc011.mcc460.3gppnetwork.org

scscf:
  listen_addr: 0.0.0.0
  listen_port: 5062
  advertised_addr: 192.168.31.40
  auth_mode: ims_only      # ims_only=仅IMS AKA, digest_only=仅普通SIP Digest, hybrid_fallback=优先IMS失败后回退Digest
  registration_cleanup_interval_ms: 30000
  hss:
    host: 127.0.0.1
    port: 3868
    realm: ims.mnc011.mcc460.3gppnetwork.org
  domain: ims.mnc011.mcc460.3gppnetwork.org
  exosip:
    enabled: true
    listen_addr: 0.0.0.0
    listen_port: 5072
    transport: udp
    user_agent: SimIMS-eXosip2
    event_poll_ms: 100

hss_adapter:
  type: diameter            # diameter or http2
  diameter_host: hss.ims.mnc011.mcc460.3gppnetwork.org
  diameter_port: 3868
  diameter_realm: ims.mnc011.mcc460.3gppnetwork.org
  nudm_url: http://127.0.0.1:8080/nudm-uecm/v1
  subscribers:
    # 这些订户既可供 Stub HSS 的 IMS 鉴权使用，也可在 digest_only/hybrid_fallback 模式下
    # 作为普通 SIP 客户端的本地用户名/密码来源。
    # Digest 用户名可使用:
    # - 460112024122023@ims.mnc011.mcc460.3gppnetwork.org
    # - 460112024122023
    # - +8613824122023
    # - +8613824122023@ims.mnc011.mcc460.3gppnetwork.org
    - imsi: "460112024122023"
      tel: "+8613824122023"
      password: "testpass"
      realm: "ims.mnc011.mcc460.3gppnetwork.org"
    - imsi: "460112024122024"
      tel: "+8613824122024"
      password: "testpass"
      realm: "ims.mnc011.mcc460.3gppnetwork.org"

media:
  rtpengine_host: 127.0.0.1
  rtpengine_port: 22222

dns:
  servers:
    - 127.0.0.1
    - 8.8.8.8
  timeout_ms: 3000         # milliseconds
