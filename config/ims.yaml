# IMS (IP Multimedia Subsystem) Configuration
# This is a template configuration file. Adjust values for your deployment.

global:
  log_level: debug         # trace, debug, info, warn, error, critical
  node_name: ims-node-01

pcscf:
  listen_addr: 0.0.0.0
  listen_port: 5060
  advertised_addr: 192.168.31.40
  core_entry:
    address: 127.0.0.1
    port: 5062
    transport: udp
  core_peers:
    - address: 127.0.0.1
      port: 5062
      transport: udp
    - address: 127.0.0.1
      port: 5061
      transport: udp
  pcf:
    host: 127.0.0.1
    port: 7777

icscf:
  listen_addr: 0.0.0.0
  listen_port: 5061
  advertised_addr: 192.168.31.40
  local_scscf:
    address: 127.0.0.1
    port: 5062
    transport: udp
  hss:
    host: 127.0.0.1
    port: 3868
    realm: ims.mnc011.mcc460.3gppnetwork.org

scscf:
  listen_addr: 0.0.0.0
  listen_port: 5062
  advertised_addr: 192.168.31.40
  peer_icscf:
    address: 127.0.0.1
    port: 5061
    transport: udp
  auth_mode: ims_only      # ims_only=仅IMS AKA, digest_only=仅普通SIP Digest, hybrid_fallback=优先IMS失败后回退Digest
  registration_cleanup_interval_ms: 30000
  hss:
    host: 127.0.0.1
    port: 3868
    realm: ims.mnc011.mcc460.3gppnetwork.org
  domain: ims.mnc011.mcc460.3gppnetwork.org
  exosip:
    enabled: true
    listen_addr: 0.0.0.0
    listen_port: 5072
    transport: udp
    user_agent: SimIMS-eXosip2
    event_poll_ms: 100

hss_adapter:
  type: diameter            # diameter or http2
  diameter_host: hss.ims.mnc011.mcc460.3gppnetwork.org
  diameter_port: 3868
  diameter_realm: ims.mnc011.mcc460.3gppnetwork.org
  nudm_url: http://127.0.0.1:8080/nudm-uecm/v1
  subscribers:
    # 这些订户既可供 Stub HSS 的 IMS AKA 鉴权使用，也可在 digest_only/hybrid_fallback 模式下
    # 作为普通 SIP 客户端的本地用户名/密码来源。
    # AKA 需要额外配置 ki + operator_code_type(opc/op) + 对应的 opc/op + sqn，amf 默认 8000。
    # Digest 用户名可使用:
    # - 460112024122023@ims.mnc011.mcc460.3gppnetwork.org
    # - 460112024122023
    # - +8613824122023
    # - +8613824122023@ims.mnc011.mcc460.3gppnetwork.org
    # KI 和 OPC 是 IMS AKA 鉴权所需的 16 字节十六进制密钥
    - imsi: "460112292600007"
      tel: "+8613822600007"
      realm: "ims.mnc011.mcc460.3gppnetwork.org"
      ki: "11111111111111111111111111111111"
      operator_code_type: "opc"
      opc: "11111111111111111111111111111111"
      sqn: "000000000001"
      amf: "8000"
    - imsi: "460112292600008"
      tel: "+8613822600008"
      realm: "ims.mnc011.mcc460.3gppnetwork.org"
      ki: "11111111111111111111111111111111"
      operator_code_type: "opc"
      opc: "11111111111111111111111111111111"
      sqn: "000000000002"
      amf: "8000"

media:
  rtpengine_host: 192.168.31.40
  rtpengine_port: 2223 

dns:
  servers:
    - 127.0.0.1
    - 8.8.8.8
  timeout_ms: 3000         # milliseconds
